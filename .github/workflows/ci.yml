name: Python CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check pyproject.toml exists and is valid
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "ERROR: pyproject.toml not found in $(pwd)"
            exit 1
          fi
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              tomllib.load(f)
          print('pyproject.toml is valid TOML')
          "

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (including dev)
        run: uv sync --group dev

      - name: Run linter and tests
        run: |
          make check
          make test

      - name: Run test coverage
        run: make test-coverage